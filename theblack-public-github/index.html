<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>더블랙샵 디4 시세표</title>
    <meta name="description" content="더블랙샵 디아블로4 시세표" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0d0a;
        --panel: #19140f;
        --panel-2: #211a13;
        --paper: #fff8ea;
        --muted: #b9a98e;
        --gold: #e1b45e;
        --gold-2: #ffd985;
        --line: rgba(255, 220, 150, 0.2);
        --blue: #5b8cff;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at 50% -10%, rgba(225, 180, 94, 0.24), transparent 28rem),
          radial-gradient(circle at 10% 20%, rgba(91, 140, 255, 0.12), transparent 22rem),
          linear-gradient(180deg, #17110c 0%, var(--bg) 42%, #080706 100%);
        color: var(--paper);
        font-family:
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 17px;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      .page {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 22px 14px 90px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(225, 180, 94, 0.32);
        border-radius: 22px;
        padding: 18px;
        background:
          linear-gradient(145deg, rgba(34, 26, 18, 0.96), rgba(14, 12, 10, 0.98)),
          url("logo.png") right -54px bottom -82px / 220px no-repeat;
        box-shadow: var(--shadow);
      }

      .brand-row {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand-main {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .logo {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 54px;
        height: 54px;
        border: 1px solid rgba(255, 220, 150, 0.26);
        border-radius: 50%;
        background: rgba(255, 248, 234, 0.08);
      }

      .logo img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        color: #fff9ef;
        font-size: clamp(1.85rem, 7vw, 3rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .hero p {
        margin: 6px 0 0;
        color: #e8cc91;
        font-size: 1.02rem;
        font-weight: 800;
        line-height: 1.45;
      }

      .live-pill {
        flex: 0 0 auto;
        min-width: 88px;
        border: 1px solid rgba(225, 180, 94, 0.46);
        border-radius: 14px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.08);
        text-align: center;
      }

      .live-pill span,
      .live-pill strong {
        display: block;
      }

      .live-pill span {
        color: #e8cc91;
        font-size: 0.75rem;
        font-weight: 900;
      }

      .live-pill strong {
        margin-top: 3px;
        color: #fff8ea;
        font-size: 1.45rem;
      }

      .header-actions {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
        margin-top: 15px;
      }

      .header-actions a {
        border-radius: 14px;
        padding: 12px 10px;
        color: #15110d;
        font-size: 1rem;
        font-weight: 1000;
        text-align: center;
        text-decoration: none;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
      }

      .header-actions a:first-child {
        background: #fee500;
      }

      .header-actions a:last-child {
        background: linear-gradient(135deg, #f2ca72, #d79b39);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 16px;
      }

      .chip {
        border: 1px solid rgba(255, 220, 150, 0.24);
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(255, 255, 255, 0.06);
        color: #fff7e6;
        font-size: 0.9rem;
        font-weight: 900;
      }

      .notice {
        margin: 16px auto 14px;
        border: 1px solid rgba(225, 180, 94, 0.32);
        border-left: 5px solid var(--gold);
        border-radius: 16px;
        padding: 13px 15px;
        background: rgba(255, 248, 234, 0.08);
        color: #f5dfad;
        text-align: center;
        font-weight: 900;
        line-height: 1.45;
      }

      .price-list {
        display: grid;
        gap: 13px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 17px 15px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04)),
          var(--panel);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.22);
        text-align: center;
      }

      .card h2 {
        margin: 0 0 13px;
        color: #fff6dd;
        font-size: clamp(1.3rem, 5vw, 1.72rem);
        line-height: 1.28;
      }

      .rows {
        display: grid;
        gap: 8px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 248, 234, 0.08);
        color: #efe5d1;
        text-align: left;
      }

      .row strong {
        color: #71a0ff;
        white-space: nowrap;
      }

      .row span {
        min-width: 0;
      }

      .note {
        justify-content: center;
        color: #d7c6a7;
        text-align: center;
        font-size: 0.98rem;
        line-height: 1.45;
      }

      .empty {
        border: 1px dashed rgba(255, 220, 150, 0.35);
        border-radius: 16px;
        padding: 28px 14px;
        color: var(--muted);
        text-align: center;
      }

      .contact {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 20;
        display: grid;
        gap: 8px;
      }

      .contact a,
      .modal button {
        border: 0;
        border-radius: 999px;
        padding: 10px 13px;
        background: #fee500;
        color: #15110d;
        font-weight: 1000;
        text-decoration: none;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
        cursor: pointer;
      }

      .contact a:last-child {
        background: var(--gold);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(0, 0, 0, 0.68);
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        width: min(100%, 820px);
        max-height: 90vh;
        overflow: auto;
        border: 1px solid rgba(225, 180, 94, 0.34);
        border-radius: 20px;
        padding: 18px;
        background: #14100c;
        box-shadow: var(--shadow);
      }

      .modal h2 {
        margin: 0;
        color: #fff4d9;
      }

      .modal p {
        margin: 8px 0 14px;
        color: var(--muted);
        line-height: 1.55;
      }

      .modal input,
      .modal textarea {
        width: 100%;
        border: 1px solid rgba(255, 220, 150, 0.22);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff8ea;
        outline: none;
      }

      .modal textarea {
        min-height: 46vh;
        resize: vertical;
        line-height: 1.55;
        white-space: pre;
      }

      .modal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .modal button.secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #fff8ea;
      }

      .modal button.danger {
        background: #8d2d2d;
        color: #fff;
      }

      .admin-panel {
        display: none;
      }

      .admin-panel.open {
        display: block;
      }

      .hint {
        margin-top: 10px;
        color: #c75f5f;
        font-size: 0.9rem;
        font-weight: 900;
      }

      @media (max-width: 520px) {
        body {
          font-size: 16px;
        }

        .page {
          padding: 14px 10px 88px;
        }

        .hero {
          padding: 19px 12px;
        }

        .brand-row {
          align-items: flex-start;
        }

        .logo {
          width: 48px;
          height: 48px;
        }

        .logo img {
          width: 38px;
          height: 38px;
        }

        .live-pill {
          min-width: 78px;
          padding: 7px 8px;
        }

        .live-pill strong {
          font-size: 1.28rem;
        }

        .header-actions a {
          padding: 10px 8px;
          font-size: 0.92rem;
        }

        .row strong {
          white-space: normal;
        }

        .contact {
          right: 10px;
          bottom: 10px;
        }

        .contact a {
          padding: 9px 11px;
          font-size: 0.88rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="brand-row">
          <div class="brand-main" id="adminGesture">
            <span class="logo"><img src="logo.png" alt="" /></span>
            <div>
              <h1>더블랙샵</h1>
              <p>디아블로4 시세표</p>
            </div>
          </div>
          <div class="live-pill">
            <span>현재 상담중</span>
            <strong id="talkingCount">6명</strong>
          </div>
        </div>
        <div class="header-actions">
          <a href="www.naver.com" target="_blank" rel="noopener noreferrer">1:1 오픈톡</a>
          <a href="www.naver.com" target="_blank" rel="noopener noreferrer">단톡방 입장</a>
        </div>
        <div class="meta">
          <span class="chip" id="today"></span>
          <span class="chip">대기X 상담</span>
          <span class="chip">빠른 답변</span>
        </div>
      </section>

      <div class="notice">테스트버전입니다.</div>
      <section class="price-list" id="priceList"></section>
    </main>

    <div class="contact">
      <a href="www.naver.com" target="_blank" rel="noopener noreferrer">1:1 톡</a>
      <a href="www.naver.com" target="_blank" rel="noopener noreferrer">단톡방</a>
    </div>

    <div class="modal-backdrop" id="adminModal">
      <section class="modal">
        <h2>가격표 편집</h2>
        <p>비밀번호를 입력하면 이 화면에서 가격표 원문을 붙여넣고 저장할 수 있어요.</p>

        <div id="passwordPanel">
          <input id="passwordInput" type="password" placeholder="비밀번호" autocomplete="current-password" />
          <div class="modal-actions">
            <button id="loginButton" type="button">열기</button>
            <button class="secondary" id="closeButton" type="button">닫기</button>
          </div>
          <div class="hint" id="loginHint"></div>
        </div>

        <div class="admin-panel" id="adminPanel">
          <textarea id="priceEditor" spellcheck="false"></textarea>
          <div class="modal-actions">
            <button id="previewButton" type="button">미리보기</button>
            <button id="saveButton" type="button">저장</button>
            <button class="secondary" id="copyButton" type="button">전체 복사</button>
            <button class="danger" id="resetButton" type="button">원본으로 되돌리기</button>
            <button class="secondary" id="closeEditorButton" type="button">닫기</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const STORAGE_KEY = "theblack.simple.priceText";
      const LOCAL_PREVIEW_PASSWORD = atob("dGhlMDQwOCE=");
      let serverSession = false;
      const priceList = document.querySelector("#priceList");
      const today = document.querySelector("#today");
      const talkingCount = document.querySelector("#talkingCount");
      const modal = document.querySelector("#adminModal");
      const passwordPanel = document.querySelector("#passwordPanel");
      const adminPanel = document.querySelector("#adminPanel");
      const passwordInput = document.querySelector("#passwordInput");
      const loginHint = document.querySelector("#loginHint");
      const priceEditor = document.querySelector("#priceEditor");
      let originalText = "";

      today.textContent = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Seoul",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(new Date());
      talkingCount.textContent = `${3 + ((new Date().getHours() * 7 + new Date().getMinutes()) % 6)}명`;

      init();

      async function init() {
        originalText = await loadPriceText();
        const savedText = localStorage.getItem(STORAGE_KEY);
        renderPriceList(savedText || originalText);
      }

      async function loadPriceText() {
        try {
          const savedResponse = await fetch("api/price", { cache: "no-store" });
          if (savedResponse.ok) {
            const savedData = await savedResponse.json();
            if (savedData.text) return savedData.text;
          }
        } catch {}

        try {
          const response = await fetch("가격표.txt", { cache: "no-store" });
          if (!response.ok) throw new Error("가격표를 불러오지 못했습니다.");
          return await response.text();
        } catch {
          return "";
        }
      }

      function renderPriceList(text) {
        const sections = parsePriceText(text);
        if (!sections.length) {
          priceList.innerHTML = '<div class="empty">가격표 내용을 불러오지 못했습니다.</div>';
          return;
        }

        priceList.innerHTML = sections
          .map(
            (section) => `
              <article class="card">
                <h2>${escapeHtml(section.title)}</h2>
                <div class="rows">
                  ${section.rows
                    .map((row) =>
                      row.price
                        ? `<div class="row"><span>${escapeHtml(row.label)}</span><strong>${escapeHtml(row.price)}</strong></div>`
                        : `<div class="row note">${escapeHtml(row.label)}</div>`
                    )
                    .join("")}
                </div>
              </article>
            `
          )
          .join("");
      }

      function parsePriceText(text) {
        return text
          .split(/＊{5,}/g)
          .map((block) =>
            block
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
          )
          .filter((lines) => lines.length)
          .map((lines) => {
            const title = lines[0].replace(/\uFE0F/g, "");
            const rows = lines.slice(1).map(parseRow).filter(Boolean);
            return { title, rows };
          });
      }

      function parseRow(line) {
        const clean = line.replace(/^--\s*/, "").trim();
        if (!clean) return null;
        const parts = clean.split(/\s*=\s*/);
        if (parts.length >= 2) {
          return {
            label: parts.shift().trim(),
            price: parts.join(" = ").trim()
          };
        }
        return { label: clean, price: "" };
      }

      function openAdminModal() {
        modal.classList.add("open");
        passwordPanel.style.display = "block";
        adminPanel.classList.remove("open");
        passwordInput.value = "";
        loginHint.textContent = "";
        setTimeout(() => passwordInput.focus(), 50);
      }

      const adminGesture = document.querySelector("#adminGesture");
      let adminHoldTimer = null;

      function clearAdminHold() {
        if (adminHoldTimer) {
          clearTimeout(adminHoldTimer);
          adminHoldTimer = null;
        }
      }

      adminGesture.addEventListener("pointerdown", (event) => {
        if (event.button && event.button !== 0) return;
        clearAdminHold();
        adminHoldTimer = setTimeout(() => {
          adminHoldTimer = null;
          if (navigator.vibrate) navigator.vibrate(20);
          openAdminModal();
        }, 1500);
      });
      adminGesture.addEventListener("pointerup", clearAdminHold);
      adminGesture.addEventListener("pointerleave", clearAdminHold);
      adminGesture.addEventListener("pointercancel", clearAdminHold);
      adminGesture.addEventListener("contextmenu", (event) => event.preventDefault());

      document.addEventListener("keydown", (event) => {
        if (event.ctrlKey && event.altKey && event.key.toLowerCase() === "a") {
          event.preventDefault();
          openAdminModal();
        }
      });

      document.querySelector("#closeButton").addEventListener("click", closeModal);
      document.querySelector("#closeEditorButton").addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });

      document.querySelector("#loginButton").addEventListener("click", unlockEditor);
      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") unlockEditor();
      });

      document.querySelector("#previewButton").addEventListener("click", () => {
        renderPriceList(priceEditor.value);
      });

      document.querySelector("#saveButton").addEventListener("click", async () => {
        const text = priceEditor.value;
        if (serverSession) {
          try {
            const response = await fetch("api/price", {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Accept: "application/json"
              },
              body: JSON.stringify({ text })
            });
            if (!response.ok) {
              throw new Error("저장에 실패했습니다.");
            }
            originalText = text;
            localStorage.removeItem(STORAGE_KEY);
            renderPriceList(text);
            alert("저장했습니다.");
            return;
          } catch (error) {
            alert("저장에 실패했습니다.");
            return;
          }
        }

        localStorage.setItem(STORAGE_KEY, text);
        renderPriceList(text);
        alert("저장했습니다.");
      });

      document.querySelector("#copyButton").addEventListener("click", async () => {
        await navigator.clipboard.writeText(priceEditor.value);
      });

      document.querySelector("#resetButton").addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        priceEditor.value = originalText;
        renderPriceList(originalText);
      });

      async function unlockEditor() {
        serverSession = false;

        try {
          const response = await fetch("api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json"
            },
            body: JSON.stringify({ password: passwordInput.value })
          });

          if (response.ok) {
            serverSession = true;
          } else if (passwordInput.value !== LOCAL_PREVIEW_PASSWORD) {
            loginHint.textContent = "비밀번호가 다릅니다.";
            return;
          }
        } catch {
          if (passwordInput.value !== LOCAL_PREVIEW_PASSWORD) {
            loginHint.textContent = "비밀번호가 다릅니다.";
            return;
          }
        }

        passwordPanel.style.display = "none";
        adminPanel.classList.add("open");
        priceEditor.value = localStorage.getItem(STORAGE_KEY) || originalText;
      }

      function closeModal() {
        modal.classList.remove("open");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
